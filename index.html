<script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>
<script type="text/paperscript" canvas="canvas">

view.viewSize = new Size(window.innerWidth, window.innerHeight);
var W = view.size.width;
var H = view.size.height;
var centre = new Point(W / 2, H / 2);

var years = [];
var byYear = {};
oscarsData.forEach(function(s) {
  if (!byYear[s.year]) { byYear[s.year] = []; years.push(s.year); }
  byYear[s.year].push(s);
});
years.sort(function(a,b){ return a-b; });
var numYears = years.length;

var turns = 9;
var maxTheta = turns * 2 * Math.PI;
var minTheta = 3.5;
var isMobile = view.size.width < 768;
var maxR = Math.min(W, H) * (isMobile ? 0.40 : 0.44);
var a = maxR / maxTheta;
var dotSpacingBase = isMobile ? 6 : 8;

function yearTheta(idx) {
  return minTheta + (idx / (numYears - 1)) * (maxTheta - minTheta);
}
function spiralPoint(theta) {
  var r = a * theta;
  return new Point(centre.x + r * Math.cos(theta), centre.y + r * Math.sin(theta));
}
function tangentAngle(theta) {
  var dx = a * Math.cos(theta) - a * theta * Math.sin(theta);
  var dy = a * Math.sin(theta) + a * theta * Math.cos(theta);
  return Math.atan2(dy, dx);
}

for (var ring = 1; ring <= turns; ring++) {
  var ringTheta = minTheta + (ring / turns) * (maxTheta - minTheta);
  var ringR = a * ringTheta;
  var groove = new Path.Circle(centre, ringR);
  groove.strokeColor = new Color(1, 1, 1, 0.025);
  groove.strokeWidth = 1;
}

var yearData = years.map(function(yr, idx) {
  var theta = yearTheta(idx);
  var pos   = spiralPoint(theta);
  var tang  = tangentAngle(theta);
  var perp  = tang + Math.PI / 2;
  var radialAngle = Math.atan2(pos.y - centre.y, pos.x - centre.x);
  return { year: yr, theta: theta, pos: pos, perp: perp, radialAngle: radialAngle, songs: byYear[yr] };
});

var SPIRAL_STEPS = 1000;
var allSpiralPoints = [];
for (var s = 0; s <= SPIRAL_STEPS; s++) {
  var t = minTheta + (s / SPIRAL_STEPS) * (maxTheta - minTheta);
  allSpiralPoints.push(spiralPoint(t));
}
var spiralPath = new Path();
spiralPath.strokeColor = new Color(1, 1, 1, 0.15);
spiralPath.strokeWidth = 1;

var centreHole = new Path.Circle(centre, 4);
centreHole.fillColor = new Color(1, 1, 1, 0.06);

var movingLabel = new PointText(centre);
movingLabel.fillColor = new Color(0xFE/255, 0xD7/255, 0x66/255, 0.85);
movingLabel.fontSize = 13;
movingLabel.fontFamily = 'DM Sans, sans-serif';
movingLabel.fontWeight = '600';

var DECADE_YEARS = {
  1934:1, 1940:1, 1950:1, 1960:1, 1970:1,
  1980:1, 1990:1, 2000:1, 2010:1, 2020:1, 2025:1
};

var allDots = [];

yearData.forEach(function(yd, yi) {
  var winner   = yd.songs.find(function(s){ return s.winner === 1; });
  var nominees = yd.songs.filter(function(s){ return s.winner === 0; });

  if (winner) {
    var glow2 = new Path.Circle(yd.pos, 11);
    glow2.fillColor = '#FED766';
    glow2.opacity = 0;
    glow2.blendMode = 'screen';
    allDots.push({ circle: glow2, yearIdx: yi, glowOnly: true });

    var glow1 = new Path.Circle(yd.pos, 8);
    glow1.fillColor = '#FED766';
    glow1.opacity = 0;
    glow1.blendMode = 'screen';
    allDots.push({ circle: glow1, yearIdx: yi, glowOnly: true });

    var c = new Path.Circle(yd.pos, 5.5);
    c.fillColor = '#FED766';
    c.opacity = 0;
    c.data = winner;
    allDots.push({ circle: c, yearIdx: yi });
  }

  var dotSpacing = dotSpacingBase;
  nominees.forEach(function(song, ni) {
    var dist = (ni + 1) * dotSpacing;
    var offset = new Point(
      Math.cos(yd.radialAngle) * dist,
      Math.sin(yd.radialAngle) * dist
    );
    var baseSize = Math.max(1.6, 2.8 - ni * 0.12);
    var c = new Path.Circle(yd.pos.add(offset), baseSize);
    c.fillColor = new Color(0.12, 0.12, 0.14);
    c.strokeColor = new Color(1, 1, 1, 0.45);
    c.strokeWidth = 0.6;
    c.opacity = 0;
    c.data = song;
    var entry = { circle: c, yearIdx: yi, isNominee: true, _baseSize: baseSize };
    allDots.push(entry);
  });

  if (DECADE_YEARS[yd.year]) {
    var maxNomineeDist = nominees.length * dotSpacing + 18;
    var labelDist = Math.max(maxNomineeDist, 28);
    var lx = yd.pos.x + Math.cos(yd.radialAngle) * labelDist;
    var ly = yd.pos.y + Math.sin(yd.radialAngle) * labelDist;
    var lbl = new PointText(new Point(lx, ly));
    lbl.content = String(yd.year);
    lbl.fillColor = new Color(1, 1, 1, 1);
    lbl.fontSize = 10;
    lbl.fontWeight = '600';
    lbl.fontFamily = 'DM Sans, sans-serif';
    lbl.justification = 'center';
    lbl.opacity = 0;
    yd.label = lbl;
  } else {
    yd.label = null;
  }
});

var totalDuration = 9.0;
var elapsed = 0;
var lastSpiralStep = -1;
var lastYearIdx = -1;
var animating = true;

function resetAnim() {
  elapsed = 0;
  lastSpiralStep = -1;
  lastYearIdx = -1;
  animating = true;
  spiralPath.removeSegments();
  allDots.forEach(function(d){ d.circle.opacity = 0; });
  yearData.forEach(function(yd){ if (yd.label) yd.label.opacity = 0; });
  movingLabel.opacity = 1;
  view.on('frame', onFrame);
}

function onFrame(event) {
  if (!animating) return;
  elapsed += event.delta;
  var progress = Math.min(elapsed / totalDuration, 1);

  var stepTarget = Math.floor(progress * SPIRAL_STEPS);
  for (var i = lastSpiralStep + 1; i <= stepTarget; i++) {
    spiralPath.add(allSpiralPoints[i]);
  }
  lastSpiralStep = stepTarget;

  var yearTarget = Math.floor(progress * (numYears - 1));
  for (var yi = lastYearIdx + 1; yi <= yearTarget; yi++) {
    allDots.forEach(function(d){
      if (d.yearIdx === yi) {
        d.circle.opacity = d.glowOnly ? 0.15 : 1;
      }
    });
    if (yearData[yi] && yearData[yi].label) {
      yearData[yi].label.opacity = 0.65;
    }
  }
  lastYearIdx = yearTarget;

  if (yearTarget < numYears) {
    var yd = yearData[yearTarget];
    movingLabel.point = yd.pos.add(new Point(12, -12));
    movingLabel.content = String(yd.year);
  }

  if (progress >= 1) {
    movingLabel.opacity = 0;
    animating = false;
    view.off('frame', onFrame);
  }
}

document.getElementById('replay').addEventListener('click', function() {
  resetAnim();
});

var tooltip = document.getElementById('tooltip');
var currentHitEntry = null;

function onMouseMove(event) {
  var hitEntry = null;
  var minDist = 16;

  for (var i = 0; i < allDots.length; i++) {
    var d = allDots[i];
    if (d.glowOnly) continue;
    if (d.circle.opacity === 0) continue;
    var dist = event.point.getDistance(d.circle.position);
    if (dist < minDist) { hitEntry = d; minDist = dist; }
  }

  if (currentHitEntry && currentHitEntry !== hitEntry && currentHitEntry.isNominee) {
    var old = currentHitEntry.circle;
    var oldPos = currentHitEntry._savedPos;
    var oldSize = currentHitEntry._savedSize;
    old.remove();
    var restored = new Path.Circle(oldPos, oldSize);
    restored.fillColor = new Color(0.12, 0.12, 0.14);
    restored.strokeColor = new Color(1, 1, 1, 0.45);
    restored.strokeWidth = 0.6;
    restored.opacity = 1;
    restored.data = currentHitEntry._savedData;
    currentHitEntry.circle = restored;
    currentHitEntry = null;
  }

  if (hitEntry && hitEntry !== currentHitEntry && hitEntry.isNominee) {
    var h = hitEntry.circle;
    hitEntry._savedPos = new Point(h.position.x, h.position.y);
    hitEntry._savedSize = hitEntry._baseSize || 2.5;
    hitEntry._savedData = h.data;
    var hovered = new Path.Circle(hitEntry._savedPos, hitEntry._savedSize * 2.4);
    hovered.fillColor = new Color(0.25, 0.25, 0.30);
    hovered.strokeColor = new Color(1, 1, 1, 0.95);
    hovered.strokeWidth = 1.2;
    hovered.opacity = 1;
    hovered.data = h.data;
    h.remove();
    hitEntry.circle = hovered;
    currentHitEntry = hitEntry;
  } else if (hitEntry && !hitEntry.isNominee) {
    currentHitEntry = null;
  }

  if (hitEntry) {
    var s = hitEntry.circle.data;
    var isWinner = s.winner === 1;
    var badge = isWinner
      ? '<span class="t-badge badge-winner">🏆 Winner</span>'
      : '<span class="t-badge badge-nominee">Nominee</span>';
    tooltip.innerHTML =
      '<div class="t-year">' + s.year + '</div>' +
      '<div class="t-song">' + (s.song || '—') + '</div>' +
      '<div class="t-film">' + (s.film || '—') + '</div>' +
      '<div class="t-people">' + (s.nominees || '—') + '</div>' +
      badge;
    tooltip.style.display = 'block';
    tooltip.style.left = (event.event.clientX + 18) + 'px';
    tooltip.style.top  = (event.event.clientY - 10) + 'px';
  } else {
    tooltip.style.display = 'none';
  }
}

</script>
